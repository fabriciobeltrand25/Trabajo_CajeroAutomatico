<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:head>
    <title>Depósito</title>
    <h:outputStylesheet library="css" name="styles.css"/>
</h:head>

<h:body>
    <div class="container">
        <h2>Depósito</h2>

        <h:form>
            <h:messages style="color:red; list-style-type: none; padding: 0;" />

            <h:panelGrid columns="2" cellpadding="5">
                <h:outputLabel value="Cuenta:" for="cuenta" />
                <h:inputText id="cuenta" value="#{cajeroBean.cuenta}" 
                             required="true" requiredMessage="Ingrese la cuenta"/>

                <h:outputLabel value="PIN:" for="pin" />
                <h:inputSecret id="pin" value="#{cajeroBean.pin}" 
                               required="true" requiredMessage="Ingrese el PIN"/>

                <h:outputLabel value="Monto:" for="monto" />
                <h:inputText id="monto" value="#{cajeroBean.monto}" 
                             required="true" requiredMessage="Ingrese el monto"/>
            </h:panelGrid>

            <div style="margin-top: 20px;">
                <h:commandButton value="Depositar" 
                                 action="#{cajeroBean.depositar}" 
                                 styleClass="btn-principal"/>
                
                <br/><br/>
                
                <h:outputText value="#{cajeroBean.mensaje}" styleClass="mensaje"/>
                
                <br/><br/>
                
                <h:commandButton value="Volver al menú" 
                                 action="index?faces-redirect=true" 
                                 immediate="true" />
            </div>
        </h:form>
    </div>
</h:body>
</html>
