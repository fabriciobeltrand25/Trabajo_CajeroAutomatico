<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Depósito</title>

</h:head>
<h:body style="display:flex;justify-content:center;padding-top:80px;">

    <h:form id="formDeposito">
        <p:panel header="Depósito de Efectivo" style="width:400px">

            <p:messages id="messages" showDetail="false" closable="true">
                <p:autoUpdate/>
            </p:messages>

            <h:panelGrid columns="1" style="width:100%">

                <p:outputLabel value="Ingresa tu Cuenta"/>
                <p:inputText id="cuenta" value="#{cajeroBean.cuenta}" required="true" label="Número de Cuenta" style="width:100%"/>

                <p:outputLabel value="Ingrese su PIN"/>
                <p:password id="PIN" value="#{cajeroBean.pin}" required="true" label="Ingresa su Pin" style="width:100%"/>

                <p:outputLabel value="Monto a Retirar"/>
                <p:inputNumber value="#{cajeroBean.monto}" symbol="$ " decimalPlaces="2" style="width:100%"/>

            </h:panelGrid>
            <p:commandButton value="Depositar"
                             action="#{cajeroBean.depositar}"
                             update="@form"
                             icon="pi pi-check"
                             style="width:100%;margin-top:10px"/>

            <p:commandButton value="Volver al menú"
                             action="#{cajeroBean.irAlMenu}"
                             immediate="true"
                             styleClass="ui-button-secondary"
                             style="width:100%;margin-top:10px"/>
            <h:outputText value="#{cajeroBean.mensaje}" style="font-weight:bold"/>
        </p:panel>
    </h:form>

</h:body>
</html>
